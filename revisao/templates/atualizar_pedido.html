{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    <h1>🍽️ Atualize seu Pedido</h1>
    
    <form action="/atualizar-pedido" method="POST">
        
        <label for="campo_prato">Nome do Prato:</label>
        <input type="text" id="campo_prato" name="nome_do_prato" placeholder="Ex: Hambúrguer" required>
        
        <br><br>

        <label for="campo_mesa">Número da Mesa:</label>
        <input type="number" id="campo_mesa" name="numero_mesa" placeholder="Ex: 5" required>

        <br><br>

        <button type="submit">Atualizar Pedido 👨‍🍳</button>
    </form>
</div>

{% endblock %}
