{% extends "base.html" %}
{% block content %}
<h2>Cadastrar Desenvolvedor</h2>
<form method="POST">
    {{ form.hidden_tag() }}
    <div>
        {{ form.nome.label }}
        {{ form.nome() }}
        {% for error in form.nome.errors %}
        <span class="error">{{ error }}</span>
        {% endfor %}
    </div>
    {{ form.submit() }}
</form>
{% endblock %}
