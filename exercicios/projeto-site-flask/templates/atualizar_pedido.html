{% extends "base.html" %}

{% block conteudo %}
<div class="container">
    <h1>Atualize seu Pedido aqui!</h1>
    
    <form action="/receber_atualizar_pedido" method="POST">
        
        <label for="campo_prato">Novo Prato:</label>
        <input type="text" id="campo_prato" name="novo_prato" placeholder="Ex: Hambúrguer" required>
        
        <br><br>

        <label for="campo_mesa">Número da Mesa:</label>
        <input type="number" id="campo_mesa" name="numero_mesa" placeholder="Ex: 5" required>

        <br><br>

        <button type="submit">Enviar para a Cozinha 👨‍🍳</button>
    </form>
</div>
{% endblock %}
